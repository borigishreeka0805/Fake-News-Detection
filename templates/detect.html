<!DOCTYPE html>
<html>

<head>

<title>Fake News Analyzer</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="main-wrapper">

<div class="container">

<a class="back-btn" href="/dashboard">⬅ Back</a>

<h1>Fake News Analyzer</h1>

<p>Paste news text or URL</p>

<textarea id="newsText" placeholder="Paste news article text here..."></textarea>

<button onclick="predictNews()">Analyze Text</button>

<p class="or-text">OR</p>

<input id="newsURL" placeholder="Paste article URL">

<button onclick="predictURL()">Analyze URL</button>

<!-- AI LOADING ANIMATION -->

<div id="loader" class="loader hidden">

<div class="spinner"></div>

<p>AI is analyzing the news...</p>

</div>

<!-- RESULT -->

<div id="resultBox"></div>

</div>

</div>

<script src="/static/js/script.js"></script>

</body>

</html>
